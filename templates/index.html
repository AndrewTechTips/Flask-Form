<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Job Application Form</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="form-card">
            <h2 class="fw-bold mb-1 text-center">Job Application</h2>
            <p class="text-muted text-center mb-4 small">Please fill out the form below to submit your details</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ 'danger' if category == 'danger' else 'warning' if category == 'warning' else 'success' }} alert-dismissible fade show border-0 mb-4 text-white" role="alert" style="background-color: rgba(99, 102, 241, 0.2); border: 1px solid rgba(99, 102, 241, 0.4) !important;">
                            {{ message }}
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="post" autocomplete="off">
                {{ form.hidden_tag() }}
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="first_name" class="form-label">First Name</label>
                        <input type="text" class="form-control" id="first_name" name="first_name" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="last_name" class="form-label">Last Name</label>
                        <input type="text" class="form-control" id="last_name" name="last_name" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>

                <div class="mb-4">
                    <label for="date" class="form-label">Available Start Date</label>
                    <input type="date" class="form-control" id="date" name="date" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Current Occupation</label>
                    <div class="occupation-grid">
                        <input type="radio" class="btn-check" id="employed" name="occupation" value="employed" required>
                        <label class="btn-custom-outline" for="employed">Employed</label>

                        <input type="radio" class="btn-check" id="unemployed" name="occupation" value="unemployed" required>
                        <label class="btn-custom-outline" for="unemployed">Unemployed</label>

                        <input type="radio" class="btn-check" id="self-employed" name="occupation" value="self-employed" required>
                        <label class="btn-custom-outline" for="self-employed">Self-Employed</label>

                        <input type="radio" class="btn-check" id="student" name="occupation" value="student" required>
                        <label class="btn-custom-outline" for="student">Student</label>
                    </div>
                </div>

                <button type="submit" class="btn btn-submit mt-2">Submit Application</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
